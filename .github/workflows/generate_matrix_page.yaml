name: Generate Neuron test matrix page

on:
  pull_request_target:
    branches:
      - main
    types: [closed]
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to check out'
        default: 'main'
        required: false
        type: string
      pr_number:
        description: 'PR number to process (number or "all")'
        required: true
        type: string
      gh_pages_branch:
        description: 'GitHub Pages branch to update'
        default: 'gh-pages'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-matrix:
    if: github.event_name != 'pull_request_target' || github.repository == 'rh-ecosystem-edge/neuron-ci'
    runs-on: ubuntu-latest
    env:
      DASHBOARD_OUTPUT_DIR: '.github/scripts/test_matrix_dashboard/output'
    steps:
      - name: Set dynamic env vars
        run: |
          echo "DASHBOARD_DATA_FILEPATH=${DASHBOARD_OUTPUT_DIR}/neuron_operator_matrix.json" >> "$GITHUB_ENV"
          echo "DASHBOARD_HTML_FILEPATH=${DASHBOARD_OUTPUT_DIR}/neuron_operator_matrix.html" >> "$GITHUB_ENV"
          echo "GH_PAGES_BRANCH=${{ github.event.inputs.gh_pages_branch || 'gh-pages' }}" >> "$GITHUB_ENV"
        env:
          DASHBOARD_OUTPUT_DIR: ${{ env.DASHBOARD_OUTPUT_DIR }}

      - name: Determine PR Number
        id: determine_pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request_target" ]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" == "schedule" ]; then
            echo "PR_NUMBER=all" >> "$GITHUB_OUTPUT"
          else
            echo "PR_NUMBER=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.ref || github.event.inputs.branch || 'main' }}

      - name: Checkout GitHub Pages
        uses: actions/checkout@v5
        with:
          ref: ${{ env.GH_PAGES_BRANCH }}
          path: ${{ env.DASHBOARD_OUTPUT_DIR }}
        continue-on-error: true

      - name: Create output dir if gh-pages missing
        run: mkdir -p "${{ env.DASHBOARD_OUTPUT_DIR }}"

      - name: Initialize baseline JSON if missing
        run: |
          if [ ! -f "${{ env.DASHBOARD_DATA_FILEPATH }}" ]; then
            echo '{}' > "${{ env.DASHBOARD_DATA_FILEPATH }}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: pip install -r .github/scripts/neuron_operator_dashboard/requirements.txt

      - name: Fetch CI Data
        run: |
          echo "Processing PR: ${{ steps.determine_pr.outputs.PR_NUMBER }}"
          PERIODIC_FLAG=""
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ steps.determine_pr.outputs.PR_NUMBER }}" == "all" ]; then
            PERIODIC_FLAG="--include_periodic"
          fi
          PYTHONPATH=.github/scripts python -m neuron_operator_dashboard.fetch_ci_data \
            --pr_number "${{ steps.determine_pr.outputs.PR_NUMBER }}" \
            $PERIODIC_FLAG \
            --baseline_data_filepath "${{ env.DASHBOARD_DATA_FILEPATH }}" \
            --merged_data_filepath "${{ env.DASHBOARD_DATA_FILEPATH }}"

      - name: Generate HTML Dashboard
        run: |
          cd "${{ env.DASHBOARD_OUTPUT_DIR }}"
          if [[ "${{ github.event_name }}" == "pull_request_target" ]] && git diff --exit-code neuron_operator_matrix.json 2>/dev/null; then
            echo "No data changes"
          else
            cd "${{ github.workspace }}"
            PYTHONPATH=.github/scripts python -m neuron_operator_dashboard.generate_ci_dashboard \
              --dashboard_data_filepath "${{ env.DASHBOARD_DATA_FILEPATH }}" \
              --dashboard_html_filepath "${{ env.DASHBOARD_HTML_FILEPATH }}"
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: ${{ env.GH_PAGES_BRANCH }}
          folder: ${{ env.DASHBOARD_OUTPUT_DIR }}
          clean: false
          force: false

      - name: Delete merged bot branch
        if: |
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.merged == true &&
          github.event.pull_request.user.login == 'github-actions[bot]'
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Deleting merged branch: $BRANCH"
          git push origin --delete "$BRANCH" || echo "Branch already deleted"
